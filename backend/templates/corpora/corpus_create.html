{% extends "base.html" %}

{% block title %}登记个人语料库 - 在线语料库平台{% endblock %}

{% block content %}
<div class="page-header"><div><p class="page-eyebrow">Corpus Metadata</p><h1 class="page-title">登记个人语料库</h1><p class="page-description">登记语料元数据，不上传文件，也不启动后台加工任务。</p></div><div class="page-actions"><a class="btn btn-outline-secondary" href="{% url 'corpora:list' %}">返回列表</a></div></div>
<div class="row justify-content-center"><div class="col-xl-8">
  <form method="post" class="platform-card" novalidate>{% csrf_token %}<div class="platform-card__body p-4">
    {% for field in form %}<div class="mb-3"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}</div>{% endfor %}
    <div class="d-flex justify-content-end gap-2 mt-4"><a class="btn btn-outline-secondary" href="{% url 'corpora:list' %}">取消</a><button class="btn btn-primary" type="submit">登记语料库</button></div>
  </div></form>
</div></div>
{% endblock %}
