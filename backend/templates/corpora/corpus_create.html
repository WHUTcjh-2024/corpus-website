{% extends "base.html" %}

{% block title %}登记个人语料库 - 在线语料库平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h1 class="h3 mb-1">登记个人语料库</h1>
    <p class="text-secondary mb-3">本阶段只登记元数据，不上传文件，也不启动加工任务。</p>
    <form method="post" class="border rounded bg-white p-4" novalidate>
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% for error in field.errors %}
            <div class="text-danger small mt-1">{{ error }}</div>
          {% endfor %}
        </div>
      {% endfor %}
      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'corpora:list' %}">取消</a>
        <button class="btn btn-primary" type="submit">登记</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
