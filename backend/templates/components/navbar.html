{% load static %}
<header class="platform-navbar {% if user.is_authenticated %}platform-navbar--app{% endif %}">
  <div class="platform-navbar__inner">
    {% if user.is_authenticated %}
      <button class="icon-button d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#platformSidebar" aria-controls="platformSidebar" aria-label="打开导航菜单">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    {% endif %}
    <a class="platform-brand" href="{% if user.is_authenticated %}{% url 'accounts:dashboard' %}{% else %}{% url 'home' %}{% endif %}" aria-label="武汉理工大学外国语学院在线语料库平台首页">
      <img src="{% static 'img/whut-logo.png' %}" alt="武汉理工大学校徽" width="44" height="44">
      <span class="platform-brand__copy">
        <strong>武汉理工大学</strong>
        <small>外国语学院在线语料库平台</small>
      </span>
    </a>

    {% if user.is_authenticated %}
      <div class="navbar-actions ms-auto">
        <a class="icon-button d-none d-sm-inline-flex" href="{% url 'corpora:list' %}" title="语料库检索" aria-label="语料库检索">
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="m16 16 4 4"/></svg>
        </a>
        <div class="dropdown">
          <button class="user-menu" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="user-avatar">{{ user.username|first|upper }}</span>
            <span class="user-menu__copy d-none d-sm-block">
              <strong>{{ user.account_profile.full_name|default:user.username }}</strong>
              <small>{% if user.is_staff %}平台管理员{% else %}已审核用户{% endif %}</small>
            </span>
            <svg class="user-menu__chevron" aria-hidden="true" viewBox="0 0 24 24"><path d="m8 10 4 4 4-4"/></svg>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm">
            <li><a class="dropdown-item" href="{% url 'accounts:dashboard' %}">个人工作台</a></li>
            <li><a class="dropdown-item" href="{% url 'exports:list' %}">我的导出</a></li>
            {% if user.is_staff %}<li><a class="dropdown-item" href="{% url 'admin:index' %}">管理后台</a></li>{% endif %}
            <li><hr class="dropdown-divider"></li>
            <li>
              <form method="post" action="{% url 'accounts:logout' %}">
                {% csrf_token %}
                <button class="dropdown-item text-danger" type="submit">退出登录</button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    {% else %}
      <nav class="public-nav ms-auto" aria-label="公共导航">
        <a href="{% url 'home' %}#platform-capabilities">平台功能</a>
        <a href="{% url 'home' %}#platform-security">数据安全</a>
        <a href="{% url 'accounts:apply' %}">账号申请</a>
        <a class="btn btn-primary btn-sm px-3" href="{% url 'accounts:login' %}">登录平台</a>
      </nav>
    {% endif %}
  </div>
</header>
