<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}在线语料库平台{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand border-bottom bg-white">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{% url 'home' %}">在线语料库平台</a>
      <div class="d-flex align-items-center gap-2">
        {% if user.is_authenticated %}
          <a class="btn btn-sm btn-outline-secondary" href="{% url 'corpora:list' %}">语料库</a>
          <a class="btn btn-sm btn-outline-secondary" href="{% url 'accounts:dashboard' %}">工作台</a>
          {% if user.is_staff %}
            <a class="btn btn-sm btn-outline-secondary" href="{% url 'admin:index' %}">管理后台</a>
          {% endif %}
          <form method="post" action="{% url 'accounts:logout' %}" class="m-0">
            {% csrf_token %}
            <button class="btn btn-sm btn-outline-danger" type="submit">退出</button>
          </form>
        {% else %}
          <a class="btn btn-sm btn-outline-secondary" href="{% url 'accounts:apply' %}">申请账号</a>
          <a class="btn btn-sm btn-primary" href="{% url 'accounts:login' %}">登录</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
