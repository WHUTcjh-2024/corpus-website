name: corpus-platform-prod

services:
  web:
    build:
      context: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?CELERY_BROKER_URL is required}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?CELERY_RESULT_BACKEND is required}
      DATA_ROOT: ${DATA_ROOT:-/app/data}
      USER_UPLOAD_MAX_FILE_BYTES: ${USER_UPLOAD_MAX_FILE_BYTES:-31457280}
      USER_UPLOAD_TOTAL_BYTES: ${USER_UPLOAD_TOTAL_BYTES:-31457280}
      TEST_UPLOAD_MAX_FILE_BYTES: ${TEST_UPLOAD_MAX_FILE_BYTES:-2097152}
      TEST_UPLOAD_TOTAL_BYTES: ${TEST_UPLOAD_TOTAL_BYTES:-5242880}
      UPLOAD_SCANNER_BACKEND: ${UPLOAD_SCANNER_BACKEND:?UPLOAD_SCANNER_BACKEND is required}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_TIMEOUT_SECONDS: ${CLAMAV_TIMEOUT_SECONDS:-15}
      EXPORT_TTL_SECONDS: ${EXPORT_TTL_SECONDS:-86400}
      EXPORT_MAX_ROWS: ${EXPORT_MAX_ROWS:-100000}
      EXPORT_MAX_DOWNLOADS: ${EXPORT_MAX_DOWNLOADS:-5}
      EXPORT_MAX_JOBS_PER_HOUR: ${EXPORT_MAX_JOBS_PER_HOUR:-10}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    command: celery -A config worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?CELERY_BROKER_URL is required}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?CELERY_RESULT_BACKEND is required}
      DATA_ROOT: ${DATA_ROOT:-/app/data}
      USER_UPLOAD_MAX_FILE_BYTES: ${USER_UPLOAD_MAX_FILE_BYTES:-31457280}
      USER_UPLOAD_TOTAL_BYTES: ${USER_UPLOAD_TOTAL_BYTES:-31457280}
      TEST_UPLOAD_MAX_FILE_BYTES: ${TEST_UPLOAD_MAX_FILE_BYTES:-2097152}
      TEST_UPLOAD_TOTAL_BYTES: ${TEST_UPLOAD_TOTAL_BYTES:-5242880}
      UPLOAD_SCANNER_BACKEND: ${UPLOAD_SCANNER_BACKEND:?UPLOAD_SCANNER_BACKEND is required}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_TIMEOUT_SECONDS: ${CLAMAV_TIMEOUT_SECONDS:-15}
      EXPORT_TTL_SECONDS: ${EXPORT_TTL_SECONDS:-86400}
      EXPORT_MAX_ROWS: ${EXPORT_MAX_ROWS:-100000}
      EXPORT_MAX_DOWNLOADS: ${EXPORT_MAX_DOWNLOADS:-5}
      EXPORT_MAX_JOBS_PER_HOUR: ${EXPORT_MAX_JOBS_PER_HOUR:-10}
    volumes:
      - ./data:/app/data
